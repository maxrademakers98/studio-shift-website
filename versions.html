<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio SHIFT — Version Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(255,255,255,.35);
    margin-bottom: 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 760px;
  }
  a {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px 28px;
    text-decoration: none;
    color: #fff;
    transition: border-color .2s, background .2s, transform .15s;
  }
  a:hover {
    border-color: #01BAEF;
    background: #1a2230;
    transform: translateY(-2px);
  }
  .label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.01em;
  }
  .sub {
    font-size: 12px;
    color: rgba(255,255,255,.4);
  }
  .badge {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    background: rgba(1,186,239,.12);
    color: #01BAEF;
    padding: 3px 10px;
    border-radius: 100px;
    width: fit-content;
  }
  .badge.green { background: rgba(32,191,85,.12); color: #20BF55; }
</style>
</head>
<body>

<h1>Studio SHIFT — Versions</h1>

<div class="grid">

  <a href="index-v7b.html" target="_blank">
    <span class="label">v7B</span>
    <span class="sub">Latest — hero split layout, full sections</span>
    <span class="badge green">Current</span>
  </a>

  <a href="index-v7a.html" target="_blank">
    <span class="label">v7A</span>
    <span class="sub">v7 variant A</span>
    <span class="badge">Preview</span>
  </a>

  <a href="index-v6.html" target="_blank">
    <span class="label">v6</span>
    <span class="sub">Previous stable version</span>
    <span class="badge">Older</span>
  </a>

  <a href="freelancers.html" target="_blank">
    <span class="label">Freelancers</span>
    <span class="sub">Freelancer landing page</span>
    <span class="badge">Page</span>
  </a>


</div>

</body>
</html>
